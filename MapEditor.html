<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

  :root {
    --bg:         #0e0f11;
    --panel:      #161719;
    --border:     #2a2d33;
    --accent:     #c8a84b;
    --accent2:    #4b8fc8;
    --danger:     #c84b4b;
    --success:    #4bc87a;
    --text:       #d4d8e0;
    --text-dim:   #5a5f6b;
    --cell-bg:    #1a1c20;
    --cell-hover: #22252b;
    --cell-sel:   #2a2d1a;
    --font-mono:  'Share Tech Mono', monospace;
    --font-ui:    'Rajdhani', sans-serif;
    --cell-size:  56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOPBAR ── */
  #topbar {
    height: 44px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 24px;
    flex-shrink: 0;
  }

  #topbar .logo {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #topbar .sep { width: 1px; height: 20px; background: var(--border); }

  .tb-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 600;
    padding: 4px 12px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: border-color .15s, color .15s;
  }
  .tb-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tb-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

  #map-id-display {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
    margin-left: auto;
  }

  /* ── LAYOUT ── */
  #app {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .sb-section {
    border-bottom: 1px solid var(--border);
    padding: 12px;
  }

  .sb-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  /* Mode buttons */
  .mode-btn {
    display: block;
    width: 100%;
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-ui);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 6px 10px;
    margin-bottom: 5px;
    cursor: pointer;
    text-align: left;
    transition: all .15s;
    position: relative;
  }
  .mode-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: transparent;
    transition: background .15s;
  }
  .mode-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .mode-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,168,75,.07); }
  .mode-btn.active::before { background: var(--accent); }

  /* Connection type selector */
  .conn-type-btn {
    display: inline-block;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 3px 8px;
    margin: 2px;
    cursor: pointer;
    transition: all .15s;
  }
  .conn-type-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .conn-type-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,168,75,.1); }

  /* Direction selector */
  .dir-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 4px;
    margin-top: 6px;
  }
  .dir-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 5px;
    cursor: pointer;
    transition: all .15s;
  }
  .dir-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .dir-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,168,75,.1); }
  .dir-btn:disabled { opacity: .2; cursor: default; }
  .dir-center { border-color: transparent !important; color: var(--text-dim) !important; cursor: default !important; font-size: 10px; text-align: center; }

  /* Cell info panel */
  #cell-info {
    padding: 12px;
    flex: 1;
  }
  #cell-info .ci-title {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  #cell-coords {
    font-family: var(--font-mono);
    font-size: 18px;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .ci-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .ci-row:last-child { border-bottom: none; }
  .ci-key { color: var(--text-dim); font-family: var(--font-mono); font-size: 11px; }
  .ci-val { color: var(--text); font-weight: 600; }
  .ci-val.connected { color: var(--success); }
  .ci-val.disconnected { color: var(--text-dim); }

  .contain-select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 5px 8px;
    margin-top: 6px;
    cursor: pointer;
    outline: none;
  }
  .contain-select:focus { border-color: var(--accent); }

  /* ── CANVAS AREA ── */
  #canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: auto;
    position: relative;
    background:
      radial-gradient(circle at 20% 20%, rgba(200,168,75,.03) 0%, transparent 50%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,.02) 39px, rgba(255,255,255,.02) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,.02) 39px, rgba(255,255,255,.02) 40px);
  }

  #grid-wrapper {
    position: relative;
    display: inline-block;
  }

  #grid {
    display: grid;
    gap: 0;
    position: relative;
    z-index: 1;
  }

  .cell {
    width: var(--cell-size);
    height: var(--cell-size);
    background: var(--cell-bg);
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    transition: background .1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cell:hover { background: var(--cell-hover); }
  .cell.selected { background: var(--cell-sel); border-color: var(--accent); z-index: 2; }

  .cell-coord-label {
    position: absolute;
    top: 2px;
    left: 3px;
    font-family: var(--font-mono);
    font-size: 8px;
    color: var(--text-dim);
    pointer-events: none;
    opacity: .5;
  }

  .cell-contain-icon {
    font-size: 18px;
    pointer-events: none;
  }

  /* ── OVERLAY CANVAS ── */
  #overlay {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 3;
  }

  /* ── STATUS BAR ── */
  #statusbar {
    height: 26px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 24px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  #statusbar .status-item span { color: var(--text); }

  /* ── MODAL ── */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.open { display: flex; }

  #modal {
    background: var(--panel);
    border: 1px solid var(--border);
    width: 480px;
    max-height: 80vh;
    overflow-y: auto;
  }

  #modal-title {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }

  #modal-body { padding: 16px; }

  .field-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .field-row label {
    width: 90px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .field-row input, .field-row select {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
  }
  .field-row input:focus, .field-row select:focus { border-color: var(--accent); }

  #modal-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  textarea#json-preview {
    width: 100%;
    height: 300px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--success);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 10px;
    outline: none;
    resize: vertical;
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <span class="logo">MAP_EDITOR</span>
  <div class="sep"></div>
  <button class="tb-btn" onclick="openMapSettings()">MAP SETTINGS</button>
  <button class="tb-btn" onclick="exportJSON()">EXPORT JSON</button>
  <button class="tb-btn" onclick="importJSON()">IMPORT JSON</button>
  <button class="tb-btn danger" onclick="clearMap()">CLEAR</button>
  <span id="map-id-display">NO MAP LOADED</span>
</div>

<!-- MAIN -->
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">

    <div class="sb-section">
      <div class="sb-label">Edit Mode</div>
      <button class="mode-btn active" id="mode-connect" onclick="setMode('connect')">⟶ CONNECTION</button>
      <button class="mode-btn" id="mode-contain" onclick="setMode('contain')">◈ CONTAIN</button>
    </div>

    <div class="sb-section" id="connect-panel">
      <div class="sb-label">Connection Type</div>
      <div>
        <span class="conn-type-btn active" data-type="path" onclick="setConnType('path')">PATH</span>
        <span class="conn-type-btn" data-type="door" onclick="setConnType('door')">DOOR</span>
        <span class="conn-type-btn" data-type="closed" onclick="setConnType('closed')">CLOSED</span>
        <span class="conn-type-btn" data-type="open" onclick="setConnType('open')">OPEN</span>
      </div>
      <div class="sb-label" style="margin-top:10px">Direction</div>
      <div class="dir-grid">
        <div></div>
        <button class="dir-btn active" data-dir="Up" onclick="toggleDir('Up')">↑</button>
        <div></div>
        <button class="dir-btn active" data-dir="Left" onclick="toggleDir('Left')">←</button>
        <div class="dir-btn dir-center">DIR</div>
        <button class="dir-btn active" data-dir="Right" onclick="toggleDir('Right')">→</button>
        <div></div>
        <button class="dir-btn active" data-dir="Down" onclick="toggleDir('Down')">↓</button>
        <div></div>
      </div>
      <div style="margin-top:8px; font-family:var(--font-mono); font-size:10px; color:var(--text-dim)">
        Click a cell, then drag to neighbor to set connection
      </div>
    </div>

    <div class="sb-section" id="contain-panel" style="display:none">
      <div class="sb-label">Contain Type</div>
      <select class="contain-select" id="contain-type-select">
        <option value="">— none —</option>
        <option value="Enemy">Enemy</option>
        <option value="NPC">NPC</option>
        <option value="Chest">Chest</option>
        <option value="Item">Item</option>
        <option value="Trap">Trap</option>
        <option value="Stair">Stair</option>
      </select>
      <div style="margin-top:8px; font-family:var(--font-mono); font-size:10px; color:var(--text-dim)">
        Select type then click a cell
      </div>
    </div>

    <div id="cell-info">
      <div class="ci-title">Cell Info</div>
      <div id="cell-coords" style="color:var(--text-dim)">—</div>
      <div id="cell-connections"></div>
    </div>

  </div>

  <!-- CANVAS AREA -->
  <div id="canvas-area">
    <div id="grid-wrapper">
      <div id="grid"></div>
      <canvas id="overlay"></canvas>
    </div>
  </div>

</div>

<!-- STATUSBAR -->
<div id="statusbar">
  <div class="status-item">MODE: <span id="status-mode">CONNECT</span></div>
  <div class="status-item">CONN_TYPE: <span id="status-conn">PATH</span></div>
  <div class="status-item">GRID: <span id="status-grid">10×10</span></div>
  <div class="status-item">CELL: <span id="status-cell">—</span></div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-title">MODAL</div>
    <div id="modal-body"></div>
    <div id="modal-footer">
      <button class="tb-btn" onclick="closeModal()">CANCEL</button>
      <button class="tb-btn" id="modal-confirm" style="border-color:var(--accent);color:var(--accent)">CONFIRM</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
const CONN_TYPES = ['path', 'door', 'closed', 'open'];
const DIRECTIONS = ['Up', 'Down', 'Left', 'Right'];
const OPPOSITE   = { Up: 'Down', Down: 'Up', Left: 'Right', Right: 'Left' };
const MIRROR_RULES = { path: 'path', door: 'door', closed: 'open', open: 'closed' };
const CONTAIN_ICONS = { Enemy: 'E', NPC: 'V', Chest: 'C', Item: 'L', Trap: 'T' , Stair: 'S'};

let mapData = createEmptyMap(10, 10);
let selectedCell = null;
let mode = 'connect';
let connType = 'path';
let activeDirs = new Set(['Up', 'Down', 'Left', 'Right']);
let dragStart = null;

// ════════════════════════════════════════════════
// MAP STRUCTURE
// ════════════════════════════════════════════════
function createEmptyMap(sizeX, sizeY) {
  const cells = {};
  for (let y = 0; y < sizeY; y++) {
    for (let x = 0; x < sizeX; x++) {
      const key = cellKey(x, y);
      cells[key] = createEmptyCell(x, y);
    }
  }
  return {
    ID: { dungeon: 0, sub_layer: 0, level: 0 },
    Size: { X: sizeX, Y: sizeY },
    Prev_Layer: null,
    Next_Layer: null,
    Layer_Effect: null,
    cells
  };
}

function createEmptyCell(x, y) {
  return {
    Coordinate: { X: x, Y: y },
    Contain: null,
    Cell_Connection: {
      Up:    { Is_Connected: false, type: null },
      Down:  { Is_Connected: false, type: null },
      Left:  { Is_Connected: false, type: null },
      Right: { Is_Connected: false, type: null }
    }
  };
}

function cellKey(x, y) { return `${x},${y}`; }

// ════════════════════════════════════════════════
// RENDER GRID
// ════════════════════════════════════════════════
function renderGrid() {
  const grid = document.getElementById('grid');
  const { X, Y } = mapData.Size;
  grid.style.gridTemplateColumns = `repeat(${X}, var(--cell-size))`;
  grid.innerHTML = '';

  for (let y = 0; y < Y; y++) {
    for (let x = 0; x < X; x++) {
      const key = cellKey(x, y);
      const cell = mapData.cells[key];
      const div = document.createElement('div');
      div.className = 'cell';
      div.dataset.key = key;
      div.dataset.x = x;
      div.dataset.y = y;

      const label = document.createElement('span');
      label.className = 'cell-coord-label';
      label.textContent = `${x},${y}`;
      div.appendChild(label);

      if (selectedCell && selectedCell.key === key) div.classList.add('selected');

      div.addEventListener('mousedown', onCellMouseDown);
      div.addEventListener('mouseup',   onCellMouseUp);
      div.addEventListener('mouseover', onCellHover);
      div.addEventListener('click',     onCellClick);
      grid.appendChild(div);
    }
  }

  sizeOverlay();
  drawConnections();
  updateStatusBar();
  updateMapIdDisplay();
}

// ════════════════════════════════════════════════
// OVERLAY CANVAS — CONNECTION DRAWING
// ════════════════════════════════════════════════
function sizeOverlay() {
  const grid = document.getElementById('grid');
  const overlay = document.getElementById('overlay');
  overlay.width  = grid.offsetWidth;
  overlay.height = grid.offsetHeight;
  overlay.style.width  = grid.offsetWidth  + 'px';
  overlay.style.height = grid.offsetHeight + 'px';
}

function cellCenter(x, y) {
  const cs = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-size'));
  return {
    cx: x * cs + cs / 2,
    cy: y * cs + cs / 2
  };
}

const CONN_COLORS = { path: '#4b8fc8', door: '#c8a84b', closed: '#c84b4b', open: '#4bc87a' };

function drawConnections() {
  const overlay = document.getElementById('overlay');
  const ctx = overlay.getContext('2d');
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  const cs = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-size'));
  const { X, Y } = mapData.Size;

  for (let y = 0; y < Y; y++) {
    for (let x = 0; x < X; x++) {
      const cell = mapData.cells[cellKey(x, y)];
      const { cx, cy } = cellCenter(x, y);

      const neighborOffsets = {
        Up:    [0, -1],
        Down:  [0,  1],
        Left:  [-1, 0],
        Right: [ 1, 0]
      };

      for (const [dir, [dx, dy]] of Object.entries(neighborOffsets)) {
        const conn = cell.Cell_Connection[dir];
        if (!conn.Is_Connected) continue;

        // Only draw Right and Down from each cell to avoid double-drawing paths
        // but always draw for door/closed/open since they may be asymmetric
        if (conn.type === 'path' && (dir === 'Up' || dir === 'Left')) continue;

        const nx = x + dx;
        const ny = y + dy;
        if (nx < 0 || ny < 0 || nx >= X || ny >= Y) continue;

        const { cx: ncx, cy: ncy } = cellCenter(nx, ny);
        const color = CONN_COLORS[conn.type] || '#888';

        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(ncx, ncy);
        ctx.stroke();

        const mx = (cx + ncx) / 2;
        const my = (cy + ncy) / 2;

        if (conn.type === 'door') {
          // Door icon: small rectangle at midpoint
          ctx.fillStyle = color;
          ctx.globalAlpha = 1;
          ctx.fillRect(mx - 7, my - 5, 14, 10);
          ctx.strokeStyle = '#0e0f11';
          ctx.lineWidth = 1;
          ctx.strokeRect(mx - 7, my - 5, 14, 10);
          ctx.fillStyle = '#0e0f11';
          ctx.font = '8px Share Tech Mono';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('D', mx, my);
        } else if (conn.type === 'closed' || conn.type === 'open') {
          // Arrow pointing from cell to neighbor
          drawArrow(ctx, cx, cy, ncx, ncy, color);
          ctx.fillStyle = '#0e0f11';
          ctx.font = '7px Share Tech Mono';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = color;
          ctx.fillText(conn.type === 'closed' ? 'CL' : 'OP', mx, my - 8);
        }

        ctx.restore();
      }
    }
  }
  for (let y = 0; y < Y; y++) {
    for (let x = 0; x < X; x++) {
        const cell = mapData.cells[cellKey(x, y)]
        const { cx, cy } = cellCenter(x, y);
        if (cell.Contain != null) {
            ctx.fillStyle = '#d4d8e0';
            ctx.font = '15px Share Tech Mono';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(CONTAIN_ICONS[cell.Contain],cx,cy)
        }
        }
    }

}

function drawArrow(ctx, x1, y1, x2, y2, color) {
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const mx = (x1 + x2) / 2;
  const my = (y1 + y2) / 2;
  const headLen = 8;

  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 1;

  ctx.beginPath();
  ctx.moveTo(mx, my);
  ctx.lineTo(mx - headLen * Math.cos(angle - Math.PI/6), my - headLen * Math.sin(angle - Math.PI/6));
  ctx.moveTo(mx, my);
  ctx.lineTo(mx - headLen * Math.cos(angle + Math.PI/6), my - headLen * Math.sin(angle + Math.PI/6));
  ctx.stroke();
  ctx.restore();
}

// ════════════════════════════════════════════════
// INTERACTION
// ════════════════════════════════════════════════
function onCellClick(e) {
  const key = e.currentTarget.dataset.key;
  const x   = parseInt(e.currentTarget.dataset.x);
  const y   = parseInt(e.currentTarget.dataset.y);

  if (mode === 'contain') {
    const type = document.getElementById('contain-type-select').value || null;
    mapData.cells[key].Contain = type;
    renderGrid();
    selectCell(key, x, y);
    return;
  }

  selectCell(key, x, y);
}

function onCellMouseDown(e) {
  if (mode !== 'connect') return;
  dragStart = { key: e.currentTarget.dataset.key, x: parseInt(e.currentTarget.dataset.x), y: parseInt(e.currentTarget.dataset.y) };
}

function onCellMouseUp(e) {
  if (mode !== 'connect' || !dragStart) return;
  const endKey = e.currentTarget.dataset.key;
  const ex = parseInt(e.currentTarget.dataset.x);
  const ey = parseInt(e.currentTarget.dataset.y);

  if (endKey !== dragStart.key) {
    trySetConnection(dragStart.x, dragStart.y, ex, ey);
  }

  dragStart = null;
}

function onCellHover(e) {
  const x = parseInt(e.currentTarget.dataset.x);
  const y = parseInt(e.currentTarget.dataset.y);
  document.getElementById('status-cell').textContent = `${x},${y}`;
}

function trySetConnection(x1, y1, x2, y2) {
  const dx = x2 - x1;
  const dy = y2 - y1;

  // Only allow direct neighbors
  if (Math.abs(dx) + Math.abs(dy) !== 1) return;

  let dir = null;
  if (dx === 1)  dir = 'Right';
  if (dx === -1) dir = 'Left';
  if (dy === 1)  dir = 'Down';
  if (dy === -1) dir = 'Up';

  if (!activeDirs.has(dir)) return;

  const key1 = cellKey(x1, y1);
  const key2 = cellKey(x2, y2);
  const conn1 = mapData.cells[key1].Cell_Connection[dir];

  // Toggle: if already this type, remove connection
  if (conn1.Is_Connected && conn1.type === connType) {
    conn1.Is_Connected = false;
    conn1.type = null;
    // Mirror removal
    const oppConn = mapData.cells[key2].Cell_Connection[OPPOSITE[dir]];
    oppConn.Is_Connected = false;
    oppConn.type = null;
  } else {
    conn1.Is_Connected = true;
    conn1.type = connType;
    // Mirror with rule
    const mirroredType = MIRROR_RULES[connType];
    const oppConn = mapData.cells[key2].Cell_Connection[OPPOSITE[dir]];
    oppConn.Is_Connected = true;
    oppConn.type = mirroredType;
  }

  renderGrid();
  if (selectedCell) updateCellInfo(selectedCell.key);
}

function selectCell(key, x, y) {
  selectedCell = { key, x, y };
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.cell[data-key="${key}"]`)?.classList.add('selected');
  updateCellInfo(key);
  document.getElementById('status-cell').textContent = `${x},${y}`;
}

function updateCellInfo(key) {
  const cell = mapData.cells[key];
  if (!cell) return;
  document.getElementById('cell-coords').textContent = `[${cell.Coordinate.X}, ${cell.Coordinate.Y}]`;

  const container = document.getElementById('cell-connections');
  container.innerHTML = '';

  const containRow = document.createElement('div');
  containRow.className = 'ci-row';
  containRow.innerHTML = `<span class="ci-key">contain</span><span class="ci-val">${cell.Contain || '—'}</span>`;
  container.appendChild(containRow);

  for (const dir of DIRECTIONS) {
    const conn = cell.Cell_Connection[dir];
    const row = document.createElement('div');
    row.className = 'ci-row';
    const valClass = conn.Is_Connected ? 'connected' : 'disconnected';
    row.innerHTML = `<span class="ci-key">${dir.toLowerCase()}</span><span class="ci-val ${valClass}">${conn.Is_Connected ? conn.type : '—'}</span>`;
    container.appendChild(row);
  }
}

// ════════════════════════════════════════════════
// MODE & TOOL CONTROLS
// ════════════════════════════════════════════════
function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mode-' + m).classList.add('active');
  document.getElementById('connect-panel').style.display = m === 'connect' ? '' : 'none';
  document.getElementById('contain-panel').style.display = m === 'contain' ? '' : 'none';
  document.getElementById('status-mode').textContent = m.toUpperCase();
}

function setConnType(type) {
  connType = type;
  document.querySelectorAll('.conn-type-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.conn-type-btn[data-type="${type}"]`).classList.add('active');
  document.getElementById('status-conn').textContent = type.toUpperCase();
}

function toggleDir(dir) {
  const btn = document.querySelector(`.dir-btn[data-dir="${dir}"]`);
  if (activeDirs.has(dir)) {
    activeDirs.delete(dir);
    btn.classList.remove('active');
  } else {
    activeDirs.add(dir);
    btn.classList.add('active');
  }
}

// ════════════════════════════════════════════════
// MAP SETTINGS MODAL
// ════════════════════════════════════════════════
function openMapSettings() {
  const body = document.getElementById('modal-body');
  body.innerHTML = `
    <div class="field-row"><label>DUNGEON</label><input type="number" id="f-dun" min="0" max="99" value="${mapData.ID.dungeon}"></div>
    <div class="field-row"><label>SUB_LAYER</label><input type="number" id="f-sub" min="0" max="99" value="${mapData.ID.sub_layer}"></div>
    <div class="field-row"><label>LEVEL</label><input type="number" id="f-lvl" min="0" max="99" value="${mapData.ID.level}"></div>
    <div class="field-row"><label>SIZE X</label><input type="number" id="f-sx" min="1" max="99" value="${mapData.Size.X}"></div>
    <div class="field-row"><label>SIZE Y</label><input type="number" id="f-sy" min="1" max="99" value="${mapData.Size.Y}"></div>
    <div class="field-row"><label>PREV LAYER</label><input type="text" id="f-prev" value="${mapData.Prev_Layer || ''}"></div>
    <div class="field-row"><label>NEXT LAYER</label><input type="text" id="f-next" value="${mapData.Next_Layer || ''}"></div>
  `;
  document.getElementById('modal-title').textContent = 'MAP SETTINGS';
  document.getElementById('modal-confirm').onclick = applyMapSettings;
  openModal();
}

function applyMapSettings() {
  const newX = parseInt(document.getElementById('f-sx').value) || mapData.Size.X;
  const newY = parseInt(document.getElementById('f-sy').value) || mapData.Size.Y;
  const resized = newX !== mapData.Size.X || newY !== mapData.Size.Y;

  mapData.ID.dungeon   = parseInt(document.getElementById('f-dun').value) || 0;
  mapData.ID.sub_layer = parseInt(document.getElementById('f-sub').value) || 0;
  mapData.ID.level     = parseInt(document.getElementById('f-lvl').value) || 0;
  mapData.Prev_Layer   = document.getElementById('f-prev').value || null;
  mapData.Next_Layer   = document.getElementById('f-next').value || null;

  if (resized) {
    const newCells = {};
    for (let y = 0; y < newY; y++) {
      for (let x = 0; x < newX; x++) {
        const key = cellKey(x, y);
        newCells[key] = mapData.cells[key] || createEmptyCell(x, y);
      }
    }
    mapData.cells = newCells;
    mapData.Size.X = newX;
    mapData.Size.Y = newY;
  }

  closeModal();
  renderGrid();
}

// ════════════════════════════════════════════════
// EXPORT / IMPORT
// ════════════════════════════════════════════════
function exportJSON() {
  const json = JSON.stringify(buildExportData(), null, 2);
  const body = document.getElementById('modal-body');
  body.innerHTML = `<textarea id="json-preview" readonly>${json}</textarea>
    <div style="margin-top:10px;display:flex;gap:8px">
      <button class="tb-btn" onclick="copyJSON()">COPY</button>
      <button class="tb-btn" onclick="downloadJSON()">DOWNLOAD</button>
    </div>`;
  document.getElementById('modal-title').textContent = 'EXPORT JSON';
  document.getElementById('modal-confirm').style.display = 'none';
  openModal();
}

function buildExportData() {
  return {
    ID: mapData.ID,
    Size: mapData.Size,
    Prev_Layer: mapData.Prev_Layer,
    Next_Layer: mapData.Next_Layer,
    Layer_Effect: mapData.Layer_Effect,
    cells: mapData.cells
  };
}

function copyJSON() {
  navigator.clipboard.writeText(document.getElementById('json-preview').value);
}

function downloadJSON() {
  const { dungeon, sub_layer, level } = mapData.ID;
  const filename = `map_${String(dungeon).padStart(2,'0')}${String(sub_layer).padStart(2,'0')}${String(level).padStart(2,'0')}.json`;
  const blob = new Blob([document.getElementById('json-preview').value], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

function importJSON() {
  const body = document.getElementById('modal-body');
  body.innerHTML = `
    <div style="margin-bottom:10px;font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">Paste JSON or load a file:</div>
    <textarea id="json-preview" placeholder="Paste JSON here..."></textarea>
    <div style="margin-top:10px">
      <input type="file" id="json-file" accept=".json" style="display:none" onchange="loadJSONFile(event)">
      <button class="tb-btn" onclick="document.getElementById('json-file').click()">LOAD FILE</button>
    </div>`;
  document.getElementById('modal-title').textContent = 'IMPORT JSON';
  document.getElementById('modal-confirm').style.display = '';
  document.getElementById('modal-confirm').onclick = applyImport;
  openModal();
}

function loadJSONFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { document.getElementById('json-preview').value = ev.target.result; };
  reader.readAsText(file);
}

function applyImport() {
  try {
    const data = JSON.parse(document.getElementById('json-preview').value);
    mapData = data;
    closeModal();
    renderGrid();
  } catch(e) {
    alert('Invalid JSON');
  }
}

function clearMap() {
  if (!confirm('Clear all cell data?')) return;
  mapData = createEmptyMap(mapData.Size.X, mapData.Size.Y);
  selectedCell = null;
  renderGrid();
}

// ════════════════════════════════════════════════
// MODAL HELPERS
// ════════════════════════════════════════════════
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-confirm').style.display = '';
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ════════════════════════════════════════════════
// STATUS / DISPLAY
// ════════════════════════════════════════════════
function updateStatusBar() {
  document.getElementById('status-grid').textContent = `${mapData.Size.X}×${mapData.Size.Y}`;
}

function updateMapIdDisplay() {
  const { dungeon, sub_layer, level } = mapData.ID;
  document.getElementById('map-id-display').textContent =
    `ID: ${String(dungeon).padStart(2,'0')}-${String(sub_layer).padStart(2,'0')}-${String(level).padStart(2,'0')}`;
}

// ════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════
renderGrid();
window.addEventListener('resize', () => { sizeOverlay(); drawConnections(); });
</script>
</body>
</html>
